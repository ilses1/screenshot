<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>截图标注</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111827;
        color: #e5e7eb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: #1f2933;
        border-bottom: 1px solid #374151;
      }
      #canvas-container {
        width: 100%;
        height: calc(100% - 42px);
        display: flex;
        justify-content: center;
        align-items: center;
        background: #111827;
      }
      button {
        padding: 4px 10px;
        border-radius: 4px;
        border: 1px solid #4b5563;
        background: #374151;
        color: #e5e7eb;
        cursor: pointer;
      }
      button:hover {
        background: #4b5563;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <span>工具：</span>
      <button data-tool="pen">画笔</button>
      <button data-tool="rect">矩形</button>
      <button id="undo-button">撤销</button>
      <button id="ocr-button">OCR</button>
      <button id="upload-button">上传图床</button>
      <span id="color-display" style="margin-left: auto; font-size: 12px; opacity: 0.8;"></span>
      <button id="finish-button">完成并复制</button>
    </div>
    <div id="canvas-container">
      <canvas id="editor-canvas"></canvas>
    </div>
    <script type="module" src="./editor.ts"></script>
  </body>
</html>
