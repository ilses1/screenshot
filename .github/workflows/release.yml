name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        run: corepack prepare pnpm@8.15.7 --activate

      - name: Show versions
        run: |
          node --version
          pnpm --version
          pnpm config get registry

      - name: Configure registry
        run: |
          pnpm config set registry https://registry.npmjs.org/
          pnpm config set electron_mirror https://github.com/electron/electron/releases/download/
          pnpm config get registry

      - name: Patch .npmrc for CI
        run: |
          Set-Content -Path .npmrc -Value @(
            'registry=https://registry.npmjs.org/'
          )
          Get-Content .npmrc

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Package (NSIS)
        run: pnpm run dist -- --win --x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
